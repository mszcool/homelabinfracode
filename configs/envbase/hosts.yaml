---
# Base group hierarchy for ring0 infrastructure
#
# This file defines the Ansible group structure shared across all environments.
# Actual host assignments are in <env>/hosts.yaml
# (e.g., configs/envtest/inventory/hosts.yaml or configs.private/envprod/inventory/hosts.yaml).
#
# Usage (directory-based inventory):
#   ansible-playbook \
#     -i configs/envbase/ \
#     -i configs/<envXXX>/inventory/ \
#     playbooks/ring0/<playbook>.yaml

all:
  children:
    # Parent group: incus nodes + localhost (for ISO build playbooks).
    # localhost needs access to incus cluster variables (host_configs, incus_root_user, etc.)
    # but is not member of the 'incus' group. This parent group allows
    # group_vars/incus_scope/ to be visible to both localhost and incus nodes.
    incus_scope:
      hosts:
        localhost:
          ansible_connection: local
          # Override interpreter: ansible.cfg's ~/pythonvenv path doesn't expand ~
          # in the module execution context for explicit inventory hosts.
          ansible_python_interpreter: "{{ ansible_playbook_python }}"
      children:
        incus:

    # Samba4 Active Directory Domain Controller
    identityprovider:

    # Future: Authentic / Authentik security token service
    securitytokenservice:

    # TrueNAS SCALE storage servers
    truenas:

    # MikroTik main router (managed via localhost API)
    mainrouter:

    # Raspberry Pi edge devices - individual site groups
    garage:
    pool:

    # Parent group for all edge devices
    edge_devices:
      children:
        garage:
        pool:
