---
# Base (shared) constants for Incus cluster hosts
#
# NOTE: This file is intentionally in group_vars/all/ (not group_vars/incus/)
# because it is consumed by both:
#   - hosts: localhost playbooks (ISO image builds run locally)
#   - hosts: incus playbooks (import ISOs, update nodes, disk PCI mapping)
# localhost is not a member of the incus group, so placing this in
# group_vars/incus/ would break the localhost playbooks.
#
# Environment-specific seeds are provided by:
#   <env>/group_vars/all/host-incus-cluster.yaml
#   (e.g., configs/envtest/inventory/ or configs.private/envprod/inventory/)
#
# Required seed variables:
#   From common-seeds.yaml:
#     localdomain:                    Local domain name (e.g., mszlocal)
#   From host-incus-cluster.yaml:
#     incus_root_user:                Admin user name (e.g., mszmaster)
#     incus_root_user_fullname:       Admin user full name
#     incus_root_user_password:       Admin password (from 1Password via op_vault_name)
#     incus_root_user_publickey:      Admin SSH public key
#     incus_profile_disk_production:  Disk size for production profile (e.g., 96GiB)
#     incus_project_limit_production: Disk limit for production project (e.g., 1024GiB)
#     incus_project_limit_default:    Disk limit for default project (e.g., 256GiB)
#     host_configs:                   Hardware configurations per host
#     incus_trusted_clients:          Client certificate definitions
#     iso_images:                     ISO images to import (override per-env if needed)
#     incus_preseed_output_dir:       Output directory for preseed files
#   From host-incus-cluster.yaml (environment-specific):
#     incus_cert_full_access:          Path to full-access client certificate
#     incus_cert_limited_access:       Path to limited-access client certificate

# ---------- Shared constants ----------

# ISO source configuration
iso_source_url: "https://releases.ubuntu.com/noble/ubuntu-24.04.3-live-server-amd64.iso"
iso_source_path: "/iso/ubuntu-24.04.2-live-server-amd64.iso"
iso_destination_path: "/iso"
iso_working_path: "/iso/temp"

# LVM volume group name
volume_group_name: "vg0"

# Minimum packages installed on all Incus hosts
minimum_packages:
  - openssh-server
  - curl
  - ufw
  - sudo
  - lvm2
  - parted
  - net-tools
  - bridge-utils
  - thin-provisioning-tools
  - ca-certificates
  - gnupg
  - acl
  - bc
  - incus
  - qemu-utils
  - qemu-system-x86

# ISO target name for unified autoinstall
incus_iso_target_name: "ubuntu-mszprod-unified-autoinstall.iso"

# ---------- Templated from environment seeds ----------

# Incus daemon configuration (sizing from env seeds)
incus_config:
  port: 8443
  storage_images:
    volume_group: "vg0"
    volume: "images"
  storage_instances:
    volume_group: "vg0"
    volume: "instances"
  profile_disk_sizes:
    production: "{{ incus_profile_disk_production }}"
    default: "30GiB"
  project_disk_limits:
    production: "{{ incus_project_limit_production }}"
    default: "{{ incus_project_limit_default }}"

# ---------- Trusted client certificates ----------
# Structure is shared; certificate paths come from common-seeds.yaml per environment.
# Override the full list in an environment if different clients are needed.
incus_trusted_clients:
  - name: "production-fullaccess"
    description: "Full access across default, layer1, and layer0 (critical)"
    certificate_file: "{{ incus_cert_full_access }}"
    restricted: false
    projects: []  # Empty = all projects
  - name: "production-limitedaccess"
    description: "Simulated workstation 2 to test functionality"
    certificate_file: "{{ incus_cert_limited_access }}"
    restricted: true
    projects:
      - "default"
      - "prodlayer1"

# ---------- Operator home directory ----------
# Resolves the real invoking user's home directory, even when run under sudo.
# Under sudo: SUDO_USER is set → resolves original user's home.
# Without sudo: falls back to USER env var.
operator_home_dir: "{{ lookup('pipe', 'getent passwd ' + (lookup('env', 'SUDO_USER') | default(lookup('env', 'USER'), true)) + ' | cut -d: -f6') }}"

# ---------- ISO images ----------
# Shared across environments. Override with [] or different list per-env if needed.
iso_images:
  - name: "truenas-scale-25.10.1"
    project: "prodlayer0"
    storage_pool: "incus-instances"
    iso_path: "/srv/iso/truenas-25.04.2.5.iso"
    iso_source_local: "{{ operator_home_dir }}/iso/TrueNAS-SCALE-25.10.1.iso"
  - name: "ubuntu-desktop-24.04.3"
    project: "prodlayer1"
    storage_pool: "incus-instances"
    iso_path: "/srv/iso/ubuntu-24.04.3-desktop-amd64.iso"
    iso_source_local: "{{ operator_home_dir }}/iso/ubuntu-24.04.3-desktop-amd64.iso"
