---
# Base (shared) defaults for the Remote Maintenance Shell container
#
# This file lives in group_vars/remote_maintenance/ because the playbook
# targets the container directly via SSH (not via incus exec).
#
# Environment-specific overrides (secrets, host details) are provided by:
#   <env>/group_vars/remote_maintenance/remote-maintenance-shell.yaml
#
# Required seed variables from the environment layer:
#   remote_maint_depth_secret   - Depth sensor API secret (from vault)
#   remote_maint_mqtt_pwd       - MQTT password for the management user (from vault)

# ---------- Shared defaults ----------

# Source path for PoolRemoteAccessScripts (relative to playbook working directory)
remote_maint_scripts_src: "../../../homelab.iotdevices/PoolRemoteAccessScripts"

# Depth sensor address
remote_maint_depth_ip: ""

# MQTT broker address
remote_maint_mqtt_server: ""

# MQTT username for remote management
remote_maint_mqtt_user: ""

# Packages to install on the container
remote_maint_packages:
  - mosquitto-clients
  - python3
  - python3-venv
  - python3-pip
  - jq
