---
# Base (shared) constants for Home Assistant OS VM configuration (Ring 1)
#
# This file lives in group_vars/home_assistant/ because the HA VM is managed
# via SSH through the Terminal & SSH add-on.
#
# Environment-specific overrides are provided by:
#   <env>/group_vars/home_assistant/apps-homeassistant-configuration.yaml
#   (e.g., configs.private/envlocaldev/inventory/ or configs.private/envprod/inventory/)
#
# Required seed variables from the environment layer:
#   ha_config_env_path:                       Path to environment-specific HA config files
#   ha_mqtt_password:                         MQTT broker password for the homeassistant user
#   ha_recorder_db_url:                       MariaDB connection string for the recorder
#   zigbee_zstack_adapter_address_and_port:   Z2M serial port (e.g. tcp://host:port)

# ---------- HAOS config path ----------
# In HAOS 2026+, the config directory from the Terminal add-on is /homeassistant/
# Older versions used /config/. Auto-detected by the playbook pre-tasks.
ha_config_path: /homeassistant

# ---------- Config file layering ----------
# Base layer: always available, shared across environments
# Env layer: environment-specific overrides (checked first via first_found)
#
# Note: HA data files (ha_configs/, ha_configs_storage/, ha_dashboards/) live
# OUTSIDE group_vars/ — under <env-root>/home_assistant_files/ — so Ansible
# does not parse the JSON/YAML data files as group variables. The inventory
# walker is told to skip the home_assistant_files/ directory via
# inventory_ignore_patterns in ansible.cfg.
ha_config_base_path: "{{ playbook_dir }}/../../configs/envbase/home_assistant_files"

# Override this in envlocaldev / envprod, e.g.:
# ha_config_env_path: "{{ playbook_dir }}/../../configs.private/envlocaldev/inventory/home_assistant_files"
ha_config_env_path: ""

# ---------- Supervisor add-on repositories ----------
# Centralized list of third-party Hass.io / Supervisor add-on repositories
# to register with the Home Assistant Supervisor (App Store > ⋮ > Repositories).
#
# Note: This is for Supervisor add-on repositories ONLY. HACS itself is a
# *custom_component* (not a Supervisor add-on) and is installed separately
# by tasks/ha-install-hacs.yaml. HACS-managed integrations and frontend
# cards are configured via `ha_hacs_components` further down.
#
# Each entry:
#   url:   GitHub repository URL (https://github.com/owner/repo)
#   name:  Display name (used in task labels only; informational)
#
# Adding a new repository here makes its add-ons available for
# installation via `ha_addons` (the slug used there must match the slug
# defined in the repository's add-on `config.yaml`).
ha_addon_repositories:
  - url: "https://github.com/zigbee2mqtt/hassio-zigbee2mqtt"
    name: "Zigbee2MQTT"

# ---------- Add-ons to install via ha CLI ----------
# Each entry:
#   slug:         Supervisor add-on slug (e.g. core_mariadb)
#   name:         Display name (used in task labels only)
#   options:      Optional dict of add-on configuration applied before start.
#                 If omitted, add-on starts with its current/default options.
#   manual_steps: Optional list of post-install actions a human must perform
#                 (e.g. onboarding wizards, OAuth logins). Aggregated and
#                 rendered at the end of the playbook by post_tasks.
#
# Add-ons that come from a third-party repository require the repository
# to be listed in `ha_addon_repositories` above. The slug for repository
# add-ons is `<repo-hash>_<addon-name>` -- the repo hash is generated by
# the Supervisor from the repository URL and is stable for a given URL.
# For the official Zigbee2MQTT repo it is `45df7312`.
ha_addons:
  - slug: core_mariadb
    name: MariaDB
    options:
      databases:
        - homeassistant
      logins:
        - username: homeassistant
          password: "{{ ha_mariadb_password }}"
      rights:
        - username: homeassistant
          database: homeassistant
  - slug: a0d7b954_vscode
    name: Studio Code Server
  - slug: "45df7312_zigbee2mqtt"
    name: Zigbee2MQTT
    # The Z2M Hass.io add-on accepts the following root keys in its
    # options schema: data_path (required), mqtt, serial, socat,
    # watchdog. Everything else (advanced, frontend, homeassistant,
    # devices, ...) lives in the add-on's `configuration.yaml` and is
    # owned by Z2M / the user.
    #
    # NOTE: settings pushed here OVERRIDE the same key in
    # `configuration.yaml`. So once we manage `mqtt` and `serial` from
    # Ansible, do not also edit them via the Z2M frontend.
    options:
      # Required by the add-on schema. /config/zigbee2mqtt is the
      # add-on's documented default and the path Z2M uses for its
      # database, coordinator backup, and configuration.yaml. Changing
      # it on an existing install would orphan the device database, so
      # leave at the default.
      data_path: /config/zigbee2mqtt
      mqtt:
        base_topic: zigbee
        server: "mqtt://{{ ha_mqtt_broker }}:{{ ha_mqtt_port }}"
        user: "{{ ha_mqtt_username }}"
        password: "{{ ha_mqtt_password }}"
      serial:
        adapter: zstack
        port: "{{ zigbee_zstack_adapter_address_and_port }}"
      # The add-on schema requires the `socat` block to be present
      # even when unused. Disabled here -- the serial adapter is
      # already exposed over TCP by an external bridge, so Z2M does
      # not need its own socat forwarder. The other fields carry the
      # add-on's documented defaults to satisfy the schema.
      socat:
        enabled: false
        master: "pty,raw,echo=0,link=/tmp/ttyZ2M,mode=777"
        slave: "tcp-listen:8485,keepalive,nodelay,reuseaddr,keepidle=1,keepintvl=1,keepcnt=5"
        options: "-d -d"
        log: false
      # Watchdog retry delays in MINUTES (comma-separated). Restart
      # Z2M after 2, 4, 8, 16, 32 then 60 min if the adapter drops -- a
      # 2-minute first interval matches the user's preference and the
      # escalating tail prevents log spam if the adapter stays gone.
      watchdog: "2,4,8,16,32,60"
    manual_steps:
      - "Open the Zigbee2MQTT add-on > OPEN WEB UI and complete the"
      - "onboarding wizard: select your USB adapter, pick the Closest"
      - "WiFi Channel, and enable HA MQTT discovery by setting"
      - "`homeassistant: enabled: true` in the Z2M config."

# ---------- Zigbee2MQTT serial adapter ----------
# Z2M serial port for the zstack adapter. Override per environment
# (e.g. a USB-by-id path on direct-attached coordinators or a tcp://
# URL when the adapter is behind a serial-over-IP bridge like ser2net
# / esphome stream_server). Empty default forces the env overlay to
# set it; the playbook will fail-fast if it is missing.
zigbee_zstack_adapter_address_and_port: ""

# ---------- HACS integration ----------
# Install mode controls how the HACS install / component / storage tasks
# behave when HACS is already present on the target:
#
#   seed_only       (default, prod):
#     - HACS itself: install on first run only; never overwrite afterwards.
#     - HACS components: install on first run only; never overwrite afterwards.
#     - hacs.repositories / hacs.data: only seed when missing; never deep-merge
#       on top of existing files (lets HACS UI fully manage versions).
#
#   force_redeploy  (staging / explicit reinstall):
#     - All three tasks behave as before -- always re-evaluate version pins,
#       atomically swap files, deep-merge HACS storage. Use to test plugin
#       upgrades on staging or to forcibly resync a corrupted install.
#
# Override on the CLI when needed:
#   ansible-playbook ... -e hacs_install_mode=force_redeploy
hacs_install_mode: "seed_only"

ha_hacs_version: "2.0.5"
ha_hacs_download_url: "https://github.com/hacs/integration/releases/download/{{ ha_hacs_version }}/hacs.zip"

# Post-install actions a human must perform for HACS itself.
# Aggregated and rendered at the end of the playbook by post_tasks.
ha_hacs_manual_steps:
  - "Settings > Devices & Services > Add Integration > HACS."
  - "Complete GitHub OAuth authentication (one-time)."

# ---------- HACS components (custom_components + frontend cards) ----------
# Each entry requires:
#   full_name:       GitHub owner/repo
#   repo_id:         GitHub numeric repository ID (stable, looked up once)
#   category:        "integration" or "plugin" (HACS category)
#   version:         Pinned release tag as displayed by HACS (no leading "v")
#   tag:             (optional) Git tag used in download URLs; defaults to
#                    `version`. Set this when the GitHub tag has a "v" prefix
#                    or other format that differs from the HACS-displayed version.
#   domain:          HA integration domain (for integrations only, null for plugins)
#   manifest_name:   Display name as shown in HACS
#   source:          "archive" (default) or "direct"
#                    - archive: download the GitHub source ZIP and copy a
#                      specific path out of it. Use when the project does NOT
#                      publish a release asset (huawei_solar, tesla card).
#                    - direct: download a single file from a release asset URL.
#                      Use when the project publishes a ready-to-use asset
#                      (e.g. apexcharts-card.js).
#   archive_subpath: (source=archive only) Literal path inside the extracted
#                    ZIP, including GitHub's top-level dir prefix. For
#                    integrations: the directory containing manifest.json
#                    (e.g. "huawei_solar-1.6.0" if files are at archive root,
#                    or "<top>/custom_components/<domain>" if nested).
#                    For plugins: the JS file path
#                    (e.g. "tesla-...-1.4/tesla-...-card.js").
#   download_url:    (source=direct only) Direct release-asset URL to fetch.
#   archive_extra_paths:
#                    (source=archive plugins only, optional) List of
#                    additional files/directories to copy from the
#                    extracted source archive into `local_path`. Use for
#                    cards that need sibling assets next to the main JS
#                    (e.g. a `locales/` folder for translations).
#                    Each entry: { src: <path inside extracted archive,
#                    including GitHub's top-level dir prefix>,
#                                  dest: <path inside local_path on target> }
#                    Directories are copied recursively.
#   local_path:      Where to place the artifact on the HA file system
#                    (relative to ha_config_path). For integrations: the
#                    custom_components/<domain> directory. For plugins: the
#                    www/community/<name> directory.
#   check_file:      File whose presence indicates the component is installed
#                    (relative to ha_config_path).
#   manual_steps:    Optional list of post-install actions a human must perform
#                    (e.g. add the integration via Settings > Devices & Services,
#                    enter API credentials, complete OAuth). Aggregated and
#                    rendered at the end of the playbook by post_tasks.
#
# Source-archive URL pattern (matches HACS's own github_archive helper):
#   https://github.com/{full_name}/archive/refs/tags/{tag}.zip

ha_hacs_components:
  - full_name: "wlcrs/huawei_solar"
    repo_id: "419381725"
    category: integration
    version: "1.6.0"
    domain: huawei_solar
    manifest_name: "Huawei Solar"
    source: archive
    archive_subpath: "huawei_solar-1.6.0"
    local_path: "custom_components/huawei_solar"
    check_file: "custom_components/huawei_solar/manifest.json"
    manual_steps:
      - "Settings > Devices & Services > Add Integration > Huawei Solar."
      - "Enter inverter IP, port, and credentials."
      - "IMPORTANT: Huawei Solar and EVCC cannot be used at the same time!"

  - full_name: "marq24/ha-evcc"
    repo_id: "800610523"
    category: integration
    version: "2026.3.7"
    domain: evcc_intg
    manifest_name: "evcc ☀️🚘 Solar Charging"
    source: archive
    archive_subpath: "ha-evcc-2026.3.7/custom_components/evcc_intg"
    local_path: "custom_components/evcc_intg"
    check_file: "custom_components/evcc_intg/manifest.json"
    manual_steps:
      - "Settings > Devices & Services > Add Integration > evcc."
      - "Enter EVCC configuration details."
      - "IMPORTANT: Huawei Solar and EVCC cannot be used at the same time!"

  - full_name: "RomRider/apexcharts-card"
    repo_id: "331701152"
    category: plugin
    version: "2.2.3"
    tag: "v2.2.3"
    domain: null
    manifest_name: "ApexCharts Card"
    source: direct
    download_url: "https://github.com/RomRider/apexcharts-card/releases/download/v2.2.3/apexcharts-card.js"
    local_path: "www/community/apexcharts-card"
    check_file: "www/community/apexcharts-card/apexcharts-card.js"

  - full_name: "reptilex/tesla-style-solar-power-card"
    repo_id: "289188530"
    category: plugin
    version: "1.4"
    domain: null
    manifest_name: "Tesla Style Solar Power Card"
    source: archive
    archive_subpath: "tesla-style-solar-power-card-1.4/tesla-style-solar-power-card.js"
    local_path: "www/community/tesla-style-solar-power-card"
    check_file: "www/community/tesla-style-solar-power-card/tesla-style-solar-power-card.js"

  - full_name: "mkshb/hass-evcc-card"
    repo_id: "1174148822"
    category: plugin
    version: "0.5.18"
    tag: "v0.5.18"
    domain: null
    manifest_name: "EVCC Card"
    # The project does not publish built release assets -- only source
    # zips. The actual files live under dist/ inside the archive.
    source: archive
    archive_subpath: "hass-evcc-card-0.5.18/dist/evcc-card.js"
    archive_extra_paths:
      # Required for non-English UIs; the card auto-detects the HA
      # language and loads the matching JSON from this folder.
      - src: "hass-evcc-card-0.5.18/dist/locales"
        dest: "locales"
    local_path: "www/community/hass-evcc-card"
    check_file: "www/community/hass-evcc-card/evcc-card.js"
    manual_steps:
      - "Add the card to a Lovelace dashboard via Edit Dashboard > Add Card"
      - "> search for 'EVCC Card'. The visual editor configures everything"
      - "interactively (mode, loadpoints, etc.). All charge points and site"
      - "entities are auto-discovered from the ha-evcc integration -- no"
      - "manual entity mapping required."
      - "Lovelace YAML mode users only: register the resource manually at"
      - "/hacsfiles/hass-evcc-card/evcc-card.js (type: module)."

# ---------- MQTT broker defaults ----------
ha_mqtt_broker: mosquitto-broker
ha_mqtt_port: 1883
ha_mqtt_username: homeassistant
# ha_mqtt_password: override in environment config (from 1Password)
ha_mqtt_password: ""

# ---------- MariaDB recorder ----------
# Override ha_mariadb_password and ha_recorder_db_url in environment config
# (e.g. via 1Password / vault). The password is used both to configure the
# MariaDB add-on and to build the recorder DSN.
ha_mariadb_password: ""
ha_recorder_db_url: ""

# ---------- Config files to deploy ----------
# Files copied from ha_configs/ to {{ ha_config_path }}/
# Note: secrets.yaml is deployed separately via ansible.builtin.template
#       (not copy) because it contains Jinja2 variables that need rendering.
ha_config_files:
  - configuration.yaml
  - automations.yaml
  - scenes.yaml
  - scripts.yaml
  - input_booleans.yaml

# Subdirectories under ha_configs/ that contain *.yaml files which are
# pulled in by configuration.yaml via `!include_dir_merge_*` directives.
# Each entry is deployed to {{ ha_config_path }}/<name>/ so the include
# directive resolves to the same directory name on the target.
#
# Add a new entry here whenever configuration.yaml gains another
# `!include_dir_*` directive pointing at a sibling directory.
ha_config_include_dirs:
  - msz_templates
  - msz_sensors
  - msz_utility_meters
  - msz_mqtt_sensors
  - msz_automations

# ---------- .storage files to deploy ----------
# Files copied from ha_configs_storage/ to {{ ha_config_path }}/.storage/
# Note: HA stores these without .json extension
ha_storage_files:
  - core.config.json
  - core.floor_registry.json
  - core.area_registry.json
  - energy.json

# Files copied from ha_dashboards/ to {{ ha_config_path }}/.storage/
# Note: HA stores these without .json extension
ha_dashboard_files:
  - lovelace_dashboards.json
  - lovelace.energy_custom.json
  - lovelace.garden_and_pool.json

# ---------- Built-in HA integrations requiring manual configuration ----------
# Use this list for integrations that ship inside HA Core (no install step
# needed) but cannot be fully configured from Ansible -- typically because
# they rely on OAuth2 / Application Credentials / device pairing flows that
# require a browser session.
#
# Each entry:
#   name:         Display name (used in the post_tasks reminder banner only).
#   docs_url:     Optional link to the upstream HA integration docs.
#   manual_steps: List of post-deploy actions a human must perform.
#                 Aggregated and rendered at the end of the playbook.
ha_integrations:
  - name: "Ondilo ICO"
    docs_url: "https://www.home-assistant.io/integrations/ondilo_ico/"
    manual_steps:
      - "Built into HA core (no install needed). Uses OAuth2 + Application Credentials."
      - "Register a developer app at https://interop.ondilo.com to obtain"
      - "a client_id and client_secret."
      - "Settings > Devices & Services > Add Integration > Ondilo ICO."
      - "When prompted, add Application Credentials (client_id / client_secret)"
      - "and complete the OAuth login in the browser. OAuth cannot be automated."
