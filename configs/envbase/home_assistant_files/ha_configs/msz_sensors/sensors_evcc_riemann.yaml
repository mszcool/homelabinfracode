# Riemann sum integrations of EVCC power sensors -> energy counters (kWh)
# suitable for the Home Assistant Energy Dashboard.
#
# Source sensors live in
# msz_templates/templates_evcc_sensors.yaml. They emit instantaneous
# power values in Watts; the integration platform accumulates them into
# kWh totals with state_class: total_increasing (set automatically by
# the integration sensor).
#
# Trapezoidal method is used (same as sensors_huawei_solar_riemann.yaml)
# for better accuracy on smoothly varying loads.

# --- Grid ---
# `max_sub_interval` forces a Riemann tick at least once a minute even
# when the source value is constant or briefly unavailable. The source
# templates (`evcc_grid_consumption_power` / `evcc_grid_export_power`)
# only emit a `state_changed` when the rounded W value actually
# changes; a steady ~600 W house load that EVCC re-publishes
# unchanged for minutes would otherwise contribute zero kWh until the
# next change. Same rationale as the battery sensors below.
- platform: integration
  source: sensor.evcc_grid_consumption_power
  name: evcc_grid_consumption_energy_riemann
  unique_id: evcc_grid_consumption_energy_riemann
  unit_prefix: k
  round: 3
  method: trapezoidal
  max_sub_interval: "00:01:00"

- platform: integration
  source: sensor.evcc_grid_export_power
  name: evcc_grid_export_energy_riemann
  unique_id: evcc_grid_export_energy_riemann
  unit_prefix: k
  round: 3
  method: trapezoidal
  max_sub_interval: "00:01:00"

# --- Battery ---
- platform: integration
  source: sensor.evcc_battery_charge_power
  name: evcc_battery_charge_energy_riemann
  unique_id: evcc_battery_charge_energy_riemann
  unit_prefix: k
  round: 3
  method: trapezoidal
  # Force the integration to tick at least once a minute even when the
  # source value is constant (or the source briefly flapped to
  # unavailable). Without this, a steady charge of e.g. 270 W that the
  # template re-emits unchanged is only counted at the next state change,
  # and a short EVCC MQTT blip can lose minutes of accumulation.
  max_sub_interval: "00:01:00"

- platform: integration
  source: sensor.evcc_battery_discharge_power
  name: evcc_battery_discharge_energy_riemann
  unique_id: evcc_battery_discharge_energy_riemann
  unit_prefix: k
  round: 3
  method: trapezoidal
  max_sub_interval: "00:01:00"
