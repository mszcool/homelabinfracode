# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
# Additional automations split into per-feature files under
# msz_automations/ (YAML lists merged). This keeps UI-created automations
# in automations.yaml while IaC-owned automations live in their own files
# for PR review and deterministic deployment.
automation manual: !include_dir_merge_list msz_automations
script: !include scripts.yaml
scene: !include scenes.yaml
input_boolean: !include input_booleans.yaml

# MQTT entities (switches, sensors, lights, etc.). The MQTT broker
# connection itself lives in .storage/core.config_entries and is managed
# by Ansible. Only the entities are defined here so they can be reviewed
# in PRs as plain YAML and reloaded without restarting HA Core.
#
# Files in msz_mqtt_sensors/ are merged into a single MQTT entity list
# (e.g. mqtt_pool_sensors.yaml for the pool Tasmota devices,
# mqtt_evcc_sensors.yaml for EVCC site values).
mqtt: !include_dir_merge_list msz_mqtt_sensors

template: !include_dir_merge_list msz_templates

sensor: !include_dir_merge_list msz_sensors

utility_meter: !include_dir_merge_named msz_utility_meters

# Use MariaDB instead of the default SQLite for the recorder
recorder:
  db_url: !secret recorder_db_url
  purge_keep_days: 10
