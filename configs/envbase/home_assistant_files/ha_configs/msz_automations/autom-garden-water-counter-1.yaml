# Zigbee2MQTT Garden Water Counter 1 -- two-mode reconciliation.
#
# Two modes, selected by `input_boolean.garden_water_counter_1_human_priority`:
#
#   * human_priority = OFF  (default -- "HA owns the valve")
#       The control loop continuously drags the device toward
#       `input_boolean.garden_water_counter_1_target`. Human toggles at
#       the physical device are reverted within ~30 s. The helper is
#       INTENT, not status -- it never moves on its own at runtime.
#
#   * human_priority = ON   ("human owns the valve")
#       The control loop is disabled. The helper becomes a READ-ONLY
#       MIRROR of whatever the device reports, so the dashboard always
#       reflects reality. Toggling the helper from the dashboard in
#       this mode does nothing -- the next device report reverts it.
#
# Common bits across both modes:
#   * Startup sync: on `homeassistant.start` the helper is snapped to
#     the device's current state so a HA restart never causes a
#     physical change (important when on vacation).
#   * Mode-flip sync: when human_priority transitions OFF -> ON, the
#     helper is snapped to the device's current state once so the
#     dashboard immediately shows reality.
#
# What we deliberately do NOT do:
#   * In OFF mode, we do NOT mirror device->helper at runtime. That
#     race-condition bait was the bug we removed: a stale Zigbee
#     command echoing back hours later is indistinguishable from a
#     human toggle, and both would otherwise corrupt intent.

# ---------------------------------------------------------------------
# Mode A (human_priority OFF): control loop -- HA dictates the valve.
# ---------------------------------------------------------------------
- id: autom_garten_hauptwasser_3da6c335004b1200_water_switch_reconcile_loop
  alias: "Garden Water Main - Reconcile control loop (HA mode)"
  description: >
    Continuously reconcile the device with the desired-state helper.
    Publishes the desired state to the Linktap Switch set topic only when the
    last reported device state differs from intent.
  mode: single
  max_exceeded: silent
  trigger:
    # Immediate reaction to user-driven toggles in HA mode -- no need
    # to wait up to 30 s for the next heartbeat.
    - platform: state
      entity_id: input_boolean.garden_water_mainwater_desired_state
      id: target_changed
    # Heartbeat: every 30 seconds, recheck and resend if needed.
    # Catches dropped commands, Z2M restarts, broker outages, and
    # devices that came back online after being unreachable.
    - platform: time_pattern
      seconds: "/30"
      id: tick
  condition:
    # Do not run this if the human-override has been done on the Linktap device itself.
    - condition: state
      entity_id: binary_sensor.garten_hauptwasser_3da6c335004b1200_is_manual_mode
      state: "off"
    # Skip when the device hasn't reported a usable state yet.
    - condition: template
      value_template: >-
        {{ states('binary_sensor.garten_hauptwasser_3da6c335004b1200_is_watering') in ['on', 'off'] }}
    # Only act when desired state and reported state disagree.
    - condition: template
      value_template: >-
        {{ states('input_boolean.garden_water_mainwater_desired_state')
           != states('binary_sensor.garten_hauptwasser_3da6c335004b1200_is_watering') }}
  action:
    - service: >-
        switch.turn_{{ states('input_boolean.garden_water_mainwater_desired_state') }}
      data: {}
      target:
        entity_id: switch.garten_hauptwasser_3da6c335004b1200_water_switch

# ---------------------------------------------------------------------------
# Mirror the state of human override as tracked by Linktap to Home Assistant.
# ---------------------------------------------------------------------------
- id: autom_garten_hauptwasser_3da6c335004b1200_water_switch_mirror_device_to_target
  alias: "Garden Water Main - Mirror device into target (Human mode)"
  description: >
    While human-priority is ON, copy the device-reported state into the
    helper so the dashboard reflects reality. The control loop is
    disabled in this mode so there is no race with reverting commands.
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.garten_hauptwasser_3da6c335004b1200_is_manual_mode
      to: "on"
      id: switch_on
    - platform: state
      entity_id: binary_sensor.garten_hauptwasser_3da6c335004b1200_is_manual_mode
      to: "off"
      id: switch_off
  condition:
    # Skip when helper already matches -- harmless but avoids log noise.
    - condition: template
      value_template: >-
        {{ states('input_boolean.garden_water_mainwater_desired_state')
           != states('binary_sensor.garten_hauptwasser_3da6c335004b1200_is_manual_mode') }}
  action:
    - service: "input_boolean.turn_{{ 'on' if trigger.id == 'switch_on' else 'off' }}"
      target:
        entity_id: input_boolean.garden_water_mainwater_desired_state

# ---------------------------------------------------------------------
# Startup sync (mode-independent).
#
# `input_boolean` defaults to restoring its last value from the
# recorder. Without this, a HA restart could leave the helper
# disagreeing with the real valve and -- in HA mode -- the control
# loop would then physically change the valve at restart time. Snap
# the helper to the device's current state on startup, then let the
# active mode take over.
# ---------------------------------------------------------------------
- id: autom_garten_hauptwasser_3da6c335004b1200_water_sync_target_on_startup
  alias: "Garden Water Main - Sync target on HA startup"
  description: >
    On HA start, snap the desired-state helper to whatever the Z2M
    switch reports so a restart never changes the physical valve.
  mode: single
  trigger:
    - platform: homeassistant
      event: start
  action:
    - wait_template: >-
        {{ states('binary_sensor.garten_hauptwasser_3da6c335004b1200_is_watering') not in
           ['unknown', 'unavailable', 'none', None] }}
      timeout: "00:02:00"
      continue_on_timeout: true
    - condition: template
      value_template: >-
        {{ states('binary_sensor.garten_hauptwasser_3da6c335004b1200_is_watering') in ['on', 'off'] }}
    - service: >-
        input_boolean.turn_{{ states('binary_sensor.garten_hauptwasser_3da6c335004b1200_is_watering') }}
      target:
        entity_id: input_boolean.garden_water_mainwater_desired_state
