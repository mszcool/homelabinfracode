# Daily aggregate of garden water consumption.
# Source is the `sensor.garden_water_consumption` template wrapper, NOT
# the raw Z2M `sensor.garden_water_counter_1_water_consumed`. The raw
# Z2M sensor is a per-cycle counter that resets to 0 on every valve
# OFF -> ON; feeding it directly into utility_meter loses an entire
# cycle's worth of water on each reset (utility_meter treats any
# downward step in a `total_increasing` source as a meter reset and
# discards the prior accumulation). The template wrapper turns the
# per-cycle counter into a true monotonically-increasing lifetime
# counter that is safe to feed here.
garden_water_daily:
  source: sensor.garden_water_consumption
  cycle: daily

# Monthly aggregate of garden water consumption. See note above on
# `garden_water_daily` for why we wrap the Z2M per-cycle counter.
garden_water_monthly:
  source: sensor.garden_water_consumption
  cycle: monthly

# Monthly aggregate of combined pool energy consumption.
# Source is the cumulative "Pool Energy Total" template sensor
# (sum of pumplight_energy_total + redoxph_energy_total), because
# utility_meter requires a monotonically increasing source and the
# *_energy_today sensors reset every midnight.
pool_energy_monthly:
  source: sensor.pool_energy_total
  cycle: monthly

# Monthly aggregate of water attributed to the swimming pool.
# Source is the cumulative `sensor.pool_water_consumption` template,
# which only grows while input_boolean.attribute_water_to_pool is on
# and the garden valve is flowing.
pool_water_monthly:
  source: sensor.pool_water_consumption
  cycle: monthly
