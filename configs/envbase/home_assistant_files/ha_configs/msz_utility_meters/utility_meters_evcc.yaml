# Daily-cycle utility meters layered over the EVCC lifetime cumulative
# energy sensors. The source sensors themselves are lifetime cumulative
# (required for the Energy Dashboard); these meters reset every day at
# 00:00 so dashboards and ApexCharts can plot "today's energy" as a
# value that returns to 0 at midnight.
#
# Grid IMPORT and battery CHARGE are sourced from the guarded native
# EVCC counters in templates_evcc_sensors.yaml. Grid EXPORT and battery
# DISCHARGE are sourced from Riemann integrations in
# sensors_evcc_riemann.yaml because EVCC does not publish native
# cumulative counters for those two flows.

evcc_utility_grid_consumption_daily:
  source: sensor.evcc_grid_consumption_energy
  cycle: daily

evcc_utility_grid_export_daily:
  source: sensor.evcc_grid_export_energy_riemann
  cycle: daily

evcc_utility_battery_charge_daily:
  source: sensor.evcc_battery_charge_energy
  cycle: daily

evcc_utility_battery_discharge_daily:
  source: sensor.evcc_battery_discharge_energy_riemann
  cycle: daily
