  - sensor:
      # Combined instantaneous power draw of both pool Tasmota switches
      # (PumpLight + RedoxPH).
      - name: "Pool Total Power"
        unique_id: "pool_total_power"
        device_class: power
        state_class: measurement
        unit_of_measurement: "W"
        icon: mdi:flash
        availability: >
          {{ has_value('sensor.switch_pumplight_pumplight_power')
             and has_value('sensor.switch_redoxph_redoxph_power') }}
        state: >
          {% set p1 = states('sensor.switch_pumplight_pumplight_power') | float(0) %}
          {% set p2 = states('sensor.switch_redoxph_redoxph_power') | float(0) %}
          {{ (p1 + p2) | round(2) }}

      # Combined energy consumed today (kWh) by both pool Tasmota switches.
      # Both source sensors reset at midnight (Tasmota behavior).
      - name: "Pool Energy Today"
        unique_id: "pool_energy_today"
        device_class: energy
        state_class: total_increasing
        unit_of_measurement: "kWh"
        icon: mdi:lightning-bolt
        availability: >
          {{ has_value('sensor.switch_pumplight_pumplight_energy_today')
             and has_value('sensor.switch_redoxph_redoxph_energy_today') }}
        state: >
          {% set e1 = states('sensor.switch_pumplight_pumplight_energy_today') | float(0) %}
          {% set e2 = states('sensor.switch_redoxph_redoxph_energy_today') | float(0) %}
          {{ (e1 + e2) | round(3) }}

      # Combined cumulative energy (kWh) of both pool Tasmota switches.
      # Used as the source for the monthly utility meter, because
      # utility_meter expects a monotonically increasing source and
      # *_energy_today resets daily.
      - name: "Pool Energy Total"
        unique_id: "pool_energy_total"
        device_class: energy
        state_class: total_increasing
        unit_of_measurement: "kWh"
        icon: mdi:lightning-bolt-circle
        availability: >
          {{ has_value('sensor.switch_pumplight_pumplight_energy_total')
             and has_value('sensor.switch_redoxph_redoxph_energy_total') }}
        state: >
          {% set e1 = states('sensor.switch_pumplight_pumplight_energy_total') | float(0) %}
          {% set e2 = states('sensor.switch_redoxph_redoxph_energy_total') | float(0) %}
          {{ (e1 + e2) | round(3) }}

      # ---------------------------------------------------------------------
      # Garden Water Current Cycle is defined as a trigger-based template
      # sensor below (it needs `trigger:` semantics to keep cross-update
      # state in attributes), so nothing more is added in this regular
      # state-based block.
      # ---------------------------------------------------------------------
# ---------------------------------------------------------------------------
# Garden Water Current Cycle (trigger-based).
#
# Liters delivered during the current burst of flow. Designed so a line
# chart rises while water is actually flowing and drops to 0 when flow
# stops -- regardless of whether the Zigbee valve switch is on (the user
# often leaves it open and gates flow externally with Gardena timers,
# manual taps, etc.).
#
# The meter does NOT publish a usable instantaneous_demand reading on
# this device, so "is flowing?" must be inferred purely from changes of
# `summation_delivered`:
#   * Each summation update means water flowed -> add the positive delta
#     to the running cycle total and remember `now` as the last activity
#     timestamp.
#   * A time_pattern trigger fires once per minute and clears the cycle
#     to 0 if no summation update has been seen for `stale_minutes`.
#
# `stale_minutes` is the only knob: increase it if your flow rate is so
# low that several minutes pass between summation updates (chart would
# otherwise zigzag). 2 min is safe for typical garden-irrigation rates.
#
# Device reset handling: when the Zigbee valve switch flips OFF -> ON the
# device resets `summation_delivered` to 0. We catch the switch_on event
# and zero `last_summation` so the next post-reset reading is treated as
# a positive delta from 0 rather than a giant negative jump.
# ---------------------------------------------------------------------------
  - trigger:
      - trigger: state
        entity_id: sensor.garden_water_counter_1_water_consumed
        id: summation
      - trigger: time_pattern
        minutes: "/1"
        id: stale_check
      - trigger: state
        entity_id: switch.garden_water_counter_1_state
        to: "on"
        id: switch_on
    sensor:
      - name: "Garden Water Current Cycle"
        unique_id: garden_water_current_cycle
        # No device_class: this is a per-cycle gauge that drops back to 0
        # when flow stops, which is incompatible with device_class: water
        # (requires state_class total/total_increasing). Leaving it off
        # lets us keep state_class: measurement for nice line-chart
        # behavior in the UI.
        state_class: measurement
        unit_of_measurement: "L"
        icon: mdi:water-pump
        state: >
          {% set stale_minutes = 2 %}
          {# Cap on what we accept as a single positive delta between two
             summation updates. Above this we assume a stale/glitch reading
             rather than real flow. Typical garden flow rates make 500 L
             between two updates implausible. #}
          {% set max_delta = 500 %}
          {# A negative delta is only treated as a real device reset when
             the post-reset reading is small. Anything larger is a glitch
             (stale retained MQTT message, race with switch_on baseline
             write, etc.) and is silently rebaselined. #}
          {% set reset_threshold = 50 %}
          {% set prev_total = states('sensor.garden_water_current_cycle') | float(0) %}
          {% set attrs = this.attributes if this is not none else {} %}
          {% set last_summation = attrs.get('last_summation', 0) | float(0) %}
          {% set last_change_at = attrs.get('last_change_at', none) %}
          {% if trigger.id == 'switch_on' %}
            {# Device is about to reset summation_delivered to 0; drop
               the visible cycle to 0 too so a fresh burst starts cleanly. #}
            0
          {% elif trigger.id == 'summation' %}
            {% set current = trigger.to_state.state | float(0) %}
            {% if current >= last_summation %}
              {% set delta = current - last_summation %}
              {% if delta <= max_delta %}
                {{ (prev_total + delta) | round(3) }}
              {% else %}
                {# Implausibly large positive delta -> treat as glitch,
                   rebaseline without adding. #}
                {{ prev_total | round(3) }}
              {% endif %}
            {% elif current <= reset_threshold %}
              {# Plausible device reset: counter restarted, add the small
                 post-reset reading as new flow. #}
              {{ (prev_total + current) | round(3) }}
            {% else %}
              {# Implausible negative delta -> glitch/stale message.
                 Don't add anything; last_summation is rebaselined below. #}
              {{ prev_total | round(3) }}
            {% endif %}
          {% elif trigger.id == 'stale_check' %}
            {% if last_change_at is none %}
              {{ prev_total | round(3) }}
            {% else %}
              {% set age = (now() - (last_change_at | as_datetime)).total_seconds() / 60 %}
              {% if age >= stale_minutes %}
                0
              {% else %}
                {{ prev_total | round(3) }}
              {% endif %}
            {% endif %}
          {% else %}
            {{ prev_total | round(3) }}
          {% endif %}
        attributes:
          # Last raw summation_delivered reading we processed -- used to
          # compute the next delta. Forced to 0 on switch_on because the
          # device is about to reset its counter to 0.
          last_summation: >
            {% set attrs = this.attributes if this is not none else {} %}
            {% if trigger.id == 'switch_on' %}
              0
            {% elif trigger.id == 'summation' %}
              {{ trigger.to_state.state | float(0) }}
            {% else %}
              {{ attrs.get('last_summation', 0) | float(0) }}
            {% endif %}
          # Timestamp of the last summation update we observed. Drives the
          # stale-check that resets the cycle to 0 when flow has stopped.
          last_change_at: >
            {% set attrs = this.attributes if this is not none else {} %}
            {% if trigger.id == 'summation' %}
              {{ now().isoformat() }}
            {% else %}
              {{ attrs.get('last_change_at', none) }}
            {% endif %}

# ---------------------------------------------------------------------------
# Pool water attribution.
#
# Lifetime cumulative liters drawn from the garden tap that should be
# attributed to the swimming pool. Only accumulates when
# input_boolean.attribute_water_to_pool is ON. The switch state is no
# longer checked: if the switch is off, summation_delivered does not
# change and there is nothing to add anyway.
#
# Same race-condition handling as Garden Water Total Flow: a negative
# delta (device reset between polls) is treated as "add current" rather
# than discarded, so we don't drop the post-reset flow. We also listen
# to switch->ON to resync the baseline before the device resets.
# ---------------------------------------------------------------------------
  - trigger:
      - trigger: state
        entity_id: sensor.garden_water_counter_1_water_consumed
        id: summation
      - trigger: state
        entity_id: switch.garden_water_counter_1_state
        to: "on"
        id: switch_on
    sensor:
      - name: "Pool Water Consumption"
        unique_id: pool_water_consumption
        device_class: water
        state_class: total_increasing
        unit_of_measurement: "L"
        icon: mdi:pool
        state: >
          {% set max_delta = 500 %}
          {% set reset_threshold = 50 %}
          {% set prev_total = states('sensor.pool_water_consumption') | float(0) %}
          {% set attrs = this.attributes if this is not none else {} %}
          {% if trigger.id == 'switch_on' %}
            {{ prev_total | round(3) }}
          {% else %}
            {% set prev_summation = attrs.get('last_summation', 0) | float(0) %}
            {% set current = trigger.to_state.state | float(0) %}
            {% set attribute = is_state('input_boolean.attribute_water_to_pool', 'on') %}
            {% if not attribute %}
              {{ prev_total | round(3) }}
            {% elif current >= prev_summation %}
              {% set delta = current - prev_summation %}
              {% if delta <= max_delta %}
                {{ (prev_total + delta) | round(3) }}
              {% else %}
                {# Implausibly large positive delta -> glitch, rebaseline. #}
                {{ prev_total | round(3) }}
              {% endif %}
            {% elif current <= reset_threshold %}
              {# Plausible device reset: counter restarted, attribute the
                 small post-reset reading as new pool flow. #}
              {{ (prev_total + current) | round(3) }}
            {% else %}
              {# Implausible negative delta -> glitch/stale message,
                 rebaseline without adding. #}
              {{ prev_total | round(3) }}
            {% endif %}
          {% endif %}
        attributes:
          last_summation: >
            {% if trigger.id == 'switch_on' %}
              0
            {% else %}
              {{ trigger.to_state.state | float(0) }}
            {% endif %}
          attribution_active: >
            {{ is_state('input_boolean.attribute_water_to_pool', 'on') }}

# ---------------------------------------------------------------------------
# Pool Water Current Fill (trigger-based, gauge).
#
# Liters delivered to the pool during the current attributed fill burst.
# Rises while water is actually flowing AND
# input_boolean.attribute_water_to_pool is ON. Drops to 0 when:
#   * flow has been stale for `stale_minutes` (no summation update), OR
#   * the attribution boolean is turned OFF.
#
# Same stale-check pattern as Garden Water Current Cycle. Does NOT have a
# device_class (would conflict with state_class: measurement).
# ---------------------------------------------------------------------------
  - trigger:
      - trigger: state
        entity_id: sensor.garden_water_counter_1_water_consumed
        id: summation
      - trigger: time_pattern
        minutes: "/1"
        id: stale_check
      - trigger: state
        entity_id: switch.garden_water_counter_1_state
        to: "on"
        id: switch_on
      - trigger: state
        entity_id: input_boolean.attribute_water_to_pool
        to: "off"
        id: attribution_off
    sensor:
      - name: "Pool Water Current Fill"
        unique_id: pool_water_current_fill
        state_class: measurement
        unit_of_measurement: "L"
        icon: mdi:pool
        state: >
          {% set stale_minutes = 2 %}
          {% set max_delta = 500 %}
          {% set reset_threshold = 50 %}
          {% set prev_total = states('sensor.pool_water_current_fill') | float(0) %}
          {% set attrs = this.attributes if this is not none else {} %}
          {% set last_summation = attrs.get('last_summation', 0) | float(0) %}
          {% set last_change_at = attrs.get('last_change_at', none) %}
          {% set attribute = is_state('input_boolean.attribute_water_to_pool', 'on') %}
          {% if trigger.id == 'switch_on' %}
            0
          {% elif trigger.id == 'attribution_off' %}
            0
          {% elif trigger.id == 'summation' %}
            {% if not attribute %}
              {{ prev_total | round(3) }}
            {% else %}
              {% set current = trigger.to_state.state | float(0) %}
              {% if current >= last_summation %}
                {% set delta = current - last_summation %}
                {% if delta <= max_delta %}
                  {{ (prev_total + delta) | round(3) }}
                {% else %}
                  {{ prev_total | round(3) }}
                {% endif %}
              {% elif current <= reset_threshold %}
                {{ (prev_total + current) | round(3) }}
              {% else %}
                {{ prev_total | round(3) }}
              {% endif %}
            {% endif %}
          {% elif trigger.id == 'stale_check' %}
            {% if not attribute %}
              0
            {% elif last_change_at is none %}
              {{ prev_total | round(3) }}
            {% else %}
              {% set age = (now() - (last_change_at | as_datetime)).total_seconds() / 60 %}
              {% if age >= stale_minutes %}
                0
              {% else %}
                {{ prev_total | round(3) }}
              {% endif %}
            {% endif %}
          {% else %}
            {{ prev_total | round(3) }}
          {% endif %}
        attributes:
          last_summation: >
            {% set attrs = this.attributes if this is not none else {} %}
            {% if trigger.id == 'switch_on' %}
              0
            {% elif trigger.id == 'summation' %}
              {{ trigger.to_state.state | float(0) }}
            {% else %}
              {{ attrs.get('last_summation', 0) | float(0) }}
            {% endif %}
          last_change_at: >
            {% set attrs = this.attributes if this is not none else {} %}
            {% if trigger.id == 'summation'
                  and is_state('input_boolean.attribute_water_to_pool', 'on') %}
              {{ now().isoformat() }}
            {% else %}
              {{ attrs.get('last_change_at', none) }}
            {% endif %}
          attribution_active: >
            {{ is_state('input_boolean.attribute_water_to_pool', 'on') }}
