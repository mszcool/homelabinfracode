    payload_off: "OFF"
    payload_on: "ON"
    state_off: "OFF"
    state_on: "ON"
    state_topic: redoxph/stat/POWER1
    qos: 0
    device:
      name: Switch RedoxPH
      identifiers:
        - "mszcool:mqtt:pool-redoxph-tasmota"
