# Managed by Ansible (do not hand-edit on prod).
# Generated from .storage/core.config_entries.mqtt-subentries.json
# by scripts/ha-mqtt-subentries-to-yaml.py.
#
# Loaded via `mqtt: !include_dir_merge_list msz_mqtt_sensors` in
# configuration.yaml. The MQTT broker connection itself is still managed
# by Ansible in .storage/core.config_entries -- only entities live here.
#
# This file holds the pool-related Tasmota switches and energy sensors.
# EVCC sensors live in mqtt_evcc_sensors.yaml in this same directory.

- switch:
    unique_id: "mqtt:pool-pumplight-tasmota-pump"
    name: Pool Pump
    command_topic: pumplight/cmnd/POWER1
    device_class: switch
    payload_off: "OFF"
    payload_on: "ON"
    state_off: "OFF"
    state_on: "ON"
    state_topic: pumplight/stat/POWER1
    qos: 0
    device:
      name: Switch PumpLight
      identifiers:
        - "mszcool:mqtt:pool-pumplight-tasmota"
      model: Tasmota
      configuration_url: "http://iot.pumplightswitch"

- switch:
    unique_id: "mqtt:pool-pumplight-tasmota-light"
    name: Pool Light
    command_topic: pumplight/cmnd/POWER2
    device_class: switch
    payload_off: "OFF"
    payload_on: "ON"
    state_off: "OFF"
    state_on: "ON"
    state_topic: pumplight/stat/POWER2
    qos: 0
    device:
      name: Switch PumpLight
      identifiers:
        - "mszcool:mqtt:pool-pumplight-tasmota"
      model: Tasmota
      configuration_url: "http://iot.pumplightswitch"

- switch:
    unique_id: "mqtt:pool-redoxph-tasmota-redox"
    name: Pool Redox
