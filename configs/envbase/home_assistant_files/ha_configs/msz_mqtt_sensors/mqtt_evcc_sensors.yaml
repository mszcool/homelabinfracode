# EVCC site-level MQTT sensors.
#
# Loaded via `mqtt: !include_dir_merge_list msz_mqtt_sensors` in
# configuration.yaml. EVCC publishes site values under the `evcc/` root
# topic (configured in playbooks/ring1/templates/evcc.yaml.j2 -> mqtt.topic).
#
# All entities are grouped onto a single virtual HA device named "EVCC"
# so they show up together in the UI and energy dashboard.Their name will be evcc_evcc_*
# in HA, and their unique_id will be mqtt:evcc-site-*, which is what the MQTT integration uses to track them.

- sensor:
    unique_id: "mqtt:evcc-site-pv-1-power"
    name: EVCC PV Inverter 1 Power
    state_topic: evcc/site/pv/1/power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    device:
      name: EVCC
      identifiers:
        - "mszcool:mqtt:evcc-site"
      manufacturer: evcc.io
      model: EVCC

- sensor:
    unique_id: "mqtt:evcc-site-pv-1-energy"
    name: EVCC PV Inverter 1 Energy
    state_topic: evcc/site/pv/1/energy
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    device:
      name: EVCC
      identifiers:
        - "mszcool:mqtt:evcc-site"
      manufacturer: evcc.io
      model: EVCC

