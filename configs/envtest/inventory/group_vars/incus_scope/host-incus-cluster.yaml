---
# Test environment seeds for Incus cluster hosts
#
# This file lives in group_vars/incus_scope/ — a parent group that contains:
#   - localhost (for ISO image build playbooks that run locally)
#   - incus (bare-metal cluster nodes, as a child group)
#
# incus_root_user* variables are the admin credentials for Incus bare-metal hosts.
# ansible_user for SSH connections to incus nodes is in group_vars/incus/connection.yaml.

# ---------- Incus package source and version ----------
# Controls whether the Zabbly repository is configured on Incus server nodes,
# and which Incus version to install.
#
# incus_zabbly_enabled:
#   false → Use the default Ubuntu package (6.0.x LTS from Canonical). Safest default.
#   true  → Add the Zabbly APT repository and install the specified version.
#
# incus_zabbly_channel:
#   "stable" → Latest feature releases (6.x). Required for OCI/Docker container support.
#   "lts-6.0" → Zabbly's LTS 6.0.x track (faster patches than Ubuntu, but no new features).
#
# incus_version:
#   Specific version to install (e.g., "6.0.0", "6.7", "6.8").
#   When incus_zabbly_enabled is true, this is passed to apt as incus=<version>*.
#   Leave empty ("") to install the latest available from the selected channel.
#
# Safest default: incus_zabbly_enabled=false (stays on Ubuntu 6.0.x LTS).
# For OCI/Docker support: incus_zabbly_enabled=true, incus_zabbly_channel="stable".
incus_zabbly_enabled: true
incus_zabbly_channel: "stable"
incus_version: ""

# ---------- Environment seed variables ----------
# localdomain: provided by common-seeds.yaml
incus_root_user: "testadmin"
incus_root_user_fullname: "test admin user"
incus_root_user_password: "{{ vault_incus_root_user_password }}"
incus_root_user_publickey: "ssh-rsa "

# Incus sizing seeds (test - smaller)
incus_profile_disk_production: "50GiB"
incus_project_limit_production: "200GiB"
incus_project_limit_default: "100GiB"

# Preseed output directory (test path)
incus_preseed_output_dir: "../../configs/incus"

# Incus client certificate paths (used by incus_trusted_clients in base)
incus_cert_full_access: "../../configs/incus/trusted-client-certs/dev-workstation1.crt"
incus_cert_limited_access: "../../configs/incus/trusted-client-certs/dev-workstation2.crt"

# ---------- Hardware configurations (test - virtual/simulated) ----------
host_configs:
  - name: "msz_single_disk_server"
    virtual_disk_config:
      devices_in_scope:
        - device: "sda"
      root_partition:
        device: "sda"
        size_MB: "20480"
      volume_group_volumes:
        images:
          size_MB: "51200"
        instances:
          all_remaining_space: true
    network_config:
      physical_network_parent: "eth0"
  - name: "msz_dual_disk_server"
    virtual_disk_config:
      devices_in_scope:
        - device: "sda"
        - device: "sdb"
      root_partition:
        device: "sda"
        size_MB: "20480"
      volume_group_volumes:
        images:
          size_MB: "51200"
        instances:
          all_remaining_space: true
    network_config:
      physical_network_parent: "eth0"

# ---------- Trusted client certificates ----------
# Uses shared structure from base; certificate paths from common-seeds.yaml.
# Uncomment and override incus_trusted_clients here if test needs different clients.

# ISO images (test - none by default, overrides base)
iso_images: []
