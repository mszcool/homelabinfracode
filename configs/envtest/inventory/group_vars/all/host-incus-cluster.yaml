---
# Test environment seeds for Incus cluster hosts
#
# incus_root_user* variables are the admin credentials for Incus bare-metal hosts.
# These are group-specific: edge devices use edge_root_user, router uses router_root_name.
# Other groups override ansible_user in their own group_vars.

# ---------- Environment seed variables ----------
# localdomain: provided by common-seeds.yaml
incus_root_user: "testadmin"
incus_root_user_fullname: "test admin user"
incus_root_user_password: "{{ lookup('community.general.onepassword', 'Incus Root Password', field='password', vault=op_vault_name) }}"
incus_root_user_publickey: "ssh-rsa "

# Default SSH connection user (all-level default, overridden by other groups)
ansible_user: "{{ incus_root_user }}"

# Incus sizing seeds (test - smaller)
incus_profile_disk_production: "50GiB"
incus_project_limit_production: "200GiB"
incus_project_limit_default: "100GiB"

# Preseed output directory (test path)
incus_preseed_output_dir: "../../configs/incus"

# Incus client certificate paths (used by incus_trusted_clients in base)
incus_cert_full_access: "../../configs/incus/trusted-client-certs/dev-workstation1.crt"
incus_cert_limited_access: "../../configs/incus/trusted-client-certs/dev-workstation2.crt"

# ---------- Hardware configurations (test - virtual/simulated) ----------
host_configs:
  - name: "msz_single_disk_server"
    virtual_disk_config:
      devices_in_scope:
        - device: "sda"
      root_partition:
        device: "sda"
        size_MB: "20480"
      volume_group_volumes:
        images:
          size_MB: "51200"
        instances:
          all_remaining_space: true
    network_config:
      physical_network_parent: "eth0"
  - name: "msz_dual_disk_server"
    virtual_disk_config:
      devices_in_scope:
        - device: "sda"
        - device: "sdb"
      root_partition:
        device: "sda"
        size_MB: "20480"
      volume_group_volumes:
        images:
          size_MB: "51200"
        instances:
          all_remaining_space: true
    network_config:
      physical_network_parent: "eth0"

# ---------- Trusted client certificates ----------
# Uses shared structure from base; certificate paths from common-seeds.yaml.
# Uncomment and override incus_trusted_clients here if test needs different clients.

# ISO images (test - none by default, overrides base)
iso_images: []
