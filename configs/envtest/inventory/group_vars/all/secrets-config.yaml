---
# Secrets configuration for the test environment
#
# All secrets are centralized in group_vars/all/secrets-vault.yaml.
# By default that file uses 1Password lookups (requiring op_vault_name below
# and the OP_SERVICE_ACCOUNT_TOKEN environment variable).
#
# To use ansible-vault instead of 1Password:
#   1. Replace the lookup() expressions in secrets-vault.yaml with real values
#   2. Encrypt:  ansible-vault encrypt group_vars/all/secrets-vault.yaml
#   3. Run with:  --ask-vault-pass  or  --vault-password-file
#
# Usage (1Password, default):
#   export OP_SERVICE_ACCOUNT_TOKEN="<your-test-service-account-token>"
#   ansible-playbook -i configs/envbase/ -i configs/envtest/inventory/ playbooks/ring0/...

# 1Password vault name — referenced by lookups in secrets-vault.yaml
op_vault_name: "HomeLab-Test"
