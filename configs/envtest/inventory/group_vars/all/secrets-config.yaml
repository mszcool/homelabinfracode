---
# 1Password configuration for the test environment
#
# All secret lookups use this vault name to fetch credentials from 1Password.
# Requires:
#   - 1Password CLI (op) v2+ installed on the control node
#   - OP_SERVICE_ACCOUNT_TOKEN environment variable set with a service account
#     that has access to the specified vault
#
# Usage:
#   export OP_SERVICE_ACCOUNT_TOKEN="<your-test-service-account-token>"
#   ansible-playbook -i configs/envbase/ -i configs/envtest/inventory/ playbooks/ring0/...

op_vault_name: "HomeLab-Test"
