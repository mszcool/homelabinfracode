---
# Centralized secrets for the TEST environment
#
# By default this file uses 1Password lookups to resolve all secrets.
# The op_vault_name variable (from secrets-config.yaml) controls which vault is used.
#
# To switch to ansible-vault encrypted secrets instead of 1Password:
#   1. Replace each lookup(...) expression below with the actual secret value
#   2. Encrypt this file:  ansible-vault encrypt <this-file>
#   3. Run playbooks with:  --ask-vault-pass  or  --vault-password-file <file>
#
# To edit an encrypted file:
#   ansible-vault edit configs/envtest/inventory/group_vars/all/secrets-vault.yaml

# ---------- Incus bare-metal host credentials ----------
vault_incus_root_user_password: "{{ lookup('community.general.onepassword', 'Incus Root Password', field='password', vault=op_vault_name) }}"

# ---------- Router credentials ----------
vault_router_root_password: "{{ lookup('community.general.onepassword', 'Router Root Password', field='password', vault=op_vault_name) }}"
vault_router_automation_password: "{{ lookup('community.general.onepassword', 'Router Automation Password', field='password', vault=op_vault_name) }}"

# ---------- Edge device credentials (per-host WiFi passwords) ----------
vault_edge_wifi_passwords:
  garage-edge: "{{ lookup('community.general.onepassword', 'Garage Edge WiFi Password', field='wireless network password', vault=op_vault_name) }}"
  pool-edge: "{{ lookup('community.general.onepassword', 'Pool Edge WiFi Password', field='wireless network password', vault=op_vault_name) }}"

# ---------- Identity provider credentials ----------
vault_samba4_admin_password: "{{ lookup('community.general.onepassword', 'Samba4 Domain Admin Password', field='password', vault=op_vault_name) }}"

# ---------- TrueNAS credentials ----------
vault_truenas_admin_password: "{{ lookup('community.general.onepassword', 'TrueNAS Admin Password', field='password', vault=op_vault_name) }}"

# ---------- Per-user AD passwords ----------
# Map of username -> password for identity lifecycle management.
# Only users listed here will have their passwords set/updated.
# Users not in this map will be created with a random password.
vault_identity_user_passwords:
  testuser1: "{{ lookup('community.general.onepassword', 'testuser1 AD Account', field='password', vault=op_vault_name) }}"
  testuser2: "{{ lookup('community.general.onepassword', 'testuser2 AD Account', field='password', vault=op_vault_name) }}"
