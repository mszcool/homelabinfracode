---
# Test environment - edge device group overrides
#
# edge_root_user is the SSH admin user for Raspberry Pi edge devices.
# This is group-specific and does not rely on Ansible group precedence overrides.
# ansible_user resolves to edge_root_user for this group.

# SSH admin user for Raspberry Pi edge devices
edge_root_user: "testadmin"

# SSH connection user for this group (overrides all-level default)
ansible_user: "{{ edge_root_user }}"

# WiFi password from 1Password vault
wifi_password: "{{ lookup('community.general.onepassword', 'WiFi Password', field='password', vault=op_vault_name) }}"
