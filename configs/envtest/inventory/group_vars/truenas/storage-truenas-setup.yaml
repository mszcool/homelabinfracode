---
# Test environment seeds for TrueNAS SCALE initial setup
#
# Required environment variables:
#   TRUENAS_ADMIN_PASSWORD: Admin password for TrueNAS
#   SAMBA4_DOMAIN_ADMIN_PASSWORD: Domain admin password for AD integration
#
# Hosts are defined in hosts.yaml (truenas group)

# ---------- Environment seed variables ----------
# localdomain, ad_domain_short, samba4_addc_ip: provided by common-seeds.yaml
# truenas_hostname, truenas_admin_username: provided by host_vars on truenas-scale in hosts.yaml

# TrueNAS identity
truenas_admin_ssh_pubkey: "ssh-rsa "

# Storage Pool Configuration (test - single disk stripe)
truenas_data_pool:
  name: "data"
  topology:
    data:
      - type: "STRIPE"
        disks:
          - "sdb"
