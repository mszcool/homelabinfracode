---
# Production Layer 0 Project Configuration for Incus
# This file defines the preseed configuration for the prodlayer0 project
name: prodlayer0
config:
  features.images: true
  features.networks: false
  features.profiles: true
  features.storage.volumes: true
  limits.disk: "{{ tp_incus_config.project_disk_limits.production }}"
  restricted: true
  restricted.networks.access: phys-br,iso-nat
  restricted.devices.disk: allow
  restricted.devices.pci: allow
  restricted.devices.nic: allow
  restricted.devices.gpu: allow
  restricted.devices.usb: allow
description: Production VMs (prodlayer0) with bridged networking and higher storage limits