---
# Task: PREPARE MQTT config entry in .storage/core.config_entries (no writes yet)
#
# Ownership model: REPO-AS-TRUTH (same as configuration.yaml & .storage seeds).
# Every run rebuilds the desired MQTT entry from ha_mqtt_* vars + the
# optional core.config_entries.mqtt-subentries.json file. If it differs
# semantically from what's on disk, we replace the on-disk MQTT entry
# inside the stop window. All non-mqtt entries in core.config_entries are
# preserved verbatim.
#
# True idempotency:
#   - `entry_id` and `created_at` are reused from the existing entry when
#     present, so re-runs do NOT churn these fields.
#   - `modified_at` is excluded from the diff, then refreshed only when an
#     actual change is being written.
#
# Why direct file editing? The Supervisor REST API does not expose a way
# to create config entries (config flows are websocket-only) and the
# /services/mqtt endpoint requires `services: mqtt:need` in the calling
# add-on manifest, which the SSH add-on does not declare. So the only
# deterministic, Ansible-driven path is to edit core.config_entries while
# HA Core is stopped.
#
# This task is preparation only -- the file write happens inside the
# stop -> write -> start block in ha-deploy-storage-and-restart.yaml.
#
# Resilience: read-only here -- cannot break running HA.

- name: Validate MQTT variables are set
  ansible.builtin.assert:
    that:
      - ha_mqtt_broker | length > 0
      - ha_mqtt_port is defined
      - ha_mqtt_username | length > 0
      - ha_mqtt_password | length > 0
    fail_msg: >
      MQTT variables are not fully defined. Set ha_mqtt_broker,
      ha_mqtt_port, ha_mqtt_username and ha_mqtt_password in the
      environment overlay (e.g. configs.private/envlocaldev/inventory/
      group_vars/home_assistant/).

# --- Read existing core.config_entries ---

- name: Check if core.config_entries exists
  ansible.builtin.stat:
    path: "{{ ha_config_path }}/.storage/core.config_entries"
  register: _config_entries_stat

- name: Read existing core.config_entries
  ansible.builtin.slurp:
    src: "{{ ha_config_path }}/.storage/core.config_entries"
  register: _config_entries_slurp
  when: _config_entries_stat.stat.exists

- name: Parse existing core.config_entries
  ansible.builtin.set_fact:
    _config_entries_existing: >-
      {{ (_config_entries_slurp.content | b64decode | from_json)
         if _config_entries_stat.stat.exists
         else {
           'version': 1,
           'minor_version': 1,
           'key': 'core.config_entries',
           'data': {'entries': []}
         } }}

- name: Extract existing MQTT entry (if any)
  ansible.builtin.set_fact:
    _mqtt_existing_entry: >-
      {{ ((_config_entries_existing.data.entries | default([]))
          | selectattr('domain', 'equalto', 'mqtt') | list | first)
         | default({}) }}
    _mqtt_other_entries: >-
      {{ (_config_entries_existing.data.entries | default([]))
         | rejectattr('domain', 'equalto', 'mqtt') | list }}

# --- Load subentries (optional, env -> base overlay) ---

- name: Locate optional MQTT subentries file (env -> base overlay)
  ansible.builtin.set_fact:
    _mqtt_subentries_path: >-
      {{ lookup('first_found', _search_paths, errors='ignore') }}
  vars:
    _search_paths:
      files:
        - core.config_entries.mqtt-subentries.json
      paths: >-
        {{ ([ha_config_env_path ~ '/ha_configs_storage'] if ha_config_env_path | length > 0 else [])
           + [ha_config_base_path ~ '/ha_configs_storage'] }}

- name: Load MQTT subentries from file (or default to empty list)
  ansible.builtin.set_fact:
    _mqtt_subentries: >-
      {{ (lookup('file', _mqtt_subentries_path) | from_json)
         if (_mqtt_subentries_path | default('') | length > 0)
         else [] }}

- name: Validate MQTT subentries structure
  ansible.builtin.assert:
    that:
      - _mqtt_subentries is sequence
    fail_msg: >
      core.config_entries.mqtt-subentries.json must contain a JSON array.
      Got: {{ _mqtt_subentries | type_debug }}
  when: _mqtt_subentries_path | default('') | length > 0

# --- Reuse existing IDs / timestamps where possible ---

- name: Generate fresh entry_id (only if no existing MQTT entry)
  ansible.builtin.shell: python3 -c "import uuid; print(uuid.uuid4().hex)"
  register: _mqtt_entry_id_gen
  changed_when: false
  when: (_mqtt_existing_entry | length) == 0

- name: Resolve entry_id and created_at (reuse existing where present)
  ansible.builtin.set_fact:
    _mqtt_entry_id: >-
      {{ _mqtt_existing_entry.entry_id
         if (_mqtt_existing_entry.entry_id | default('') | length > 0)
         else _mqtt_entry_id_gen.stdout }}
    _mqtt_created_at: >-
      {{ _mqtt_existing_entry.created_at
         if (_mqtt_existing_entry.created_at | default('') | length > 0)
         else _now_iso }}
  vars:
    _now_iso: "{{ now(utc=true).isoformat() }}+00:00"

# --- Build the desired entry (without modified_at -- set later only on change) ---

- name: Build desired MQTT entry (canonical form, no modified_at)
  ansible.builtin.set_fact:
    _mqtt_desired_entry_core:
      created_at: "{{ _mqtt_created_at }}"
      data:
        broker: "{{ ha_mqtt_broker }}"
        port: "{{ ha_mqtt_port | int }}"
        username: "{{ ha_mqtt_username }}"
        password: "{{ ha_mqtt_password }}"
      disabled_by: null
      discovery_keys: {}
      domain: mqtt
      entry_id: "{{ _mqtt_entry_id }}"
      minor_version: 1
      options: {}
      pref_disable_new_entities: false
      pref_disable_polling: false
      source: user
      subentries: "{{ _mqtt_subentries }}"
      title: "{{ ha_mqtt_broker }}"
      unique_id: null
      version: 2
  no_log: true

# --- Diff: compare proposed vs existing (excluding modified_at) ---

- name: Compute existing MQTT entry without modified_at (for diff)
  ansible.builtin.set_fact:
    _mqtt_existing_for_diff: >-
      {{ _mqtt_existing_entry
         | dict2items | rejectattr('key', 'equalto', 'modified_at')
         | list | items2dict }}

- name: Decide whether MQTT entry needs to be (re)written
  ansible.builtin.set_fact:
    _mqtt_entry_write_needed: >-
      {{ _mqtt_existing_for_diff != _mqtt_desired_entry_core }}

- name: Display MQTT entry diff decision
  ansible.builtin.debug:
    msg: >-
      {{ 'MQTT entry differs from repo source-of-truth — will (re)write inside stop window.'
      if _mqtt_entry_write_needed
      else 'MQTT entry already matches repo source-of-truth — no change.' }}

# --- Stamp modified_at and assemble proposed file (only if needed) ---

- name: Stamp modified_at on the desired MQTT entry
  ansible.builtin.set_fact:
    _mqtt_new_entry: >-
      {{ _mqtt_desired_entry_core
         | combine({'modified_at': _now_iso}) }}
  vars:
    _now_iso: "{{ now(utc=true).isoformat() }}+00:00"
  when: _mqtt_entry_write_needed | bool
  no_log: true

- name: Build proposed core.config_entries content (other entries + replaced MQTT entry)
  ansible.builtin.set_fact:
    _mqtt_config_entries_proposed: >-
      {{ _config_entries_existing
         | combine({
             'data': {
               'entries': _mqtt_other_entries + [_mqtt_new_entry]
             }
           }, recursive=True) }}
  when: _mqtt_entry_write_needed | bool
  no_log: true

- name: Mark storage changed (MQTT entry pending)
  ansible.builtin.set_fact:
    _ha_storage_changed: true
  when: _mqtt_entry_write_needed | bool

- name: MQTT preparation summary
  ansible.builtin.debug:
    msg: >-
      {{ 'MQTT entry prepared for ' ~ ha_mqtt_broker ~ ':' ~ ha_mqtt_port
         ~ ' with ' ~ (_mqtt_subentries | length) ~ ' subentries (write pending stop window).'
      if (_mqtt_entry_write_needed | bool)
      else 'MQTT entry already matches source-of-truth — nothing to do.' }}
