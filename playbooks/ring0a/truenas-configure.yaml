---
# Playbook: Configure TrueNAS SCALE idempotently truenas-config.yaml
# Notes:
# - Requires the arensb.truenas Ansible collection (ansible-galaxy collection install arensb.truenas)
# - Run against hosts in the 'truenas' inventory group (inventory in use should match hosts in the provided config)
# - This playbook avoids destructive operations: it will NOT create or destroy ZFS pools. Datasets are created only when their pool already exists.
# - User passwords in truenas-config.yaml are expected to be crypt(3) hashed strings. If you supply plain-text passwords in env vars, the playbook will skip setting them and print a warning.
# - Password environment variables referenced in the config should be present on the control node (or in a vault) before running.
#
# IMPORTANT: SSH must be enabled on TrueNAS before running this playbook.
# This playbook will NOT enable or modify SSH settings to prevent accidental lockout.

- name: Configure TrueNAS SCALE from provided vars
  hosts: truenas
  gather_facts: false
  become: yes
  collections:
    - arensb.truenas

  pre_tasks:
    - name: Ensure arensb.truenas facts are available
      arensb.truenas.truenas_facts:

    - name: Get list of zpools on host so we don't attempt to create pools
      ansible.builtin.command:
        cmd: zpool list -H -o name
      register: zpool_list
      changed_when: false
      failed_when: false

    - name: Set list of pools fact
      ansible.builtin.set_fact:
        truenas_pools: "{{ zpool_list.stdout_lines | default([]) }}"

  tasks:
    # ==================== HDD Sleep/Standby Configuration ====================
    # Configure HDD standby time for specified disks to save energy.
    # Uses midclt directly since arensb.truenas collection doesn't support disk.update.
    # Valid values: 'ALWAYS ON', '5', '10', '20', '30', '60', '120', '180', '240', '300', '330'
    # Note: disk.update requires the disk identifier (e.g. {serial}XXX), not device name (sdb)
    
    - name: Query disk identifiers for HDD standby configuration
      ansible.builtin.command:
        cmd: >
          midclt call disk.query
          '[["devname", "=", "{{ item }}"]]'
      loop: "{{ system_settings.hdd_sleep_scope | default([]) }}"
      when: system_settings is defined and system_settings.hdd_sleep_scope is defined
      register: disk_query_results
      changed_when: false

    - name: Configure HDD standby time for energy savings
      ansible.builtin.shell: >
        midclt call disk.update "{{ (item.stdout | from_json | first).identifier }}" '{{ hdd_payload | to_json }}'
      args:
        executable: /bin/zsh
      vars:
        hdd_payload:
          hddstandby: "{{ system_settings.hdd_sleep | default(20) | string }}"
      loop: "{{ disk_query_results.results | default([]) }}"
      when:
        - system_settings is defined
        - system_settings.hdd_sleep_scope is defined
        - item.stdout is defined
        - (item.stdout | from_json | length) > 0
      register: hdd_standby_result
      changed_when: false
      loop_control:
        label: "{{ (item.stdout | from_json | first).devname | default('unknown') }} -> {{ system_settings.hdd_sleep | default(20) }} minutes"

    # ==================== Dataset Configuration ====================
    - name: Create datasets (only when pool exists)
      vars:
        ds: "{{ item.value }}"
        pool_name: "{{ ds.name.split('/')[0] }}"
      arensb.truenas.filesystem:
        name: "{{ ds.name }}"
        type: "{{ ds.type | default('filesystem') }}"
        comments: "{{ ds.description | default(omit) }}"
        quota: "{{ (ds.quota_gb * 1024 * 1024 * 1024) | int if (ds.quota_gb is defined and ds.quota_gb is not none) else omit }}"
        recordsize: "{{ ds.record_size | default(omit) }}"
        sync: "{{ ds.sync | default(omit) }}"
        compression: "{{ ds.compression | default(omit) }}"
        atime: "{{ ds.atime | default(omit) }}"
        acltype: "{{ ds.acl_type | default(omit) }}"
        aclmode: "{{ ds.acl_mode | default('PASSTHROUGH' if ds.acl_type | default('') == 'NFSV4' else omit) }}"
        create_ancestors: true
        state: present
      loop: "{{ datasets | dict2items if datasets is defined else [] }}"
      when: "pool_name in truenas_pools"
      loop_control:
        label: "{{ item.value.name }}"

    # Note: The arensb.truenas.sharing_smb module has compatibility issues with
    # TrueNAS SCALE API. Only minimal parameters are used here.
    # Access control is enforced by filesystem ACLs on the datasets.
    # Share configuration is embedded in dataset definitions.
    # When smb.enabled=false, the share is removed (state: absent).
    - name: Configure SMB shares from dataset definitions
      vars:
        ds: "{{ item.value }}"
        smb_enabled: "{{ ds.smb.enabled | default(false) }}"
      arensb.truenas.sharing_smb:
        name: "{{ item.key }}"
        path: "/mnt/{{ ds.name }}"
        comment: "{{ ds.description | default(omit) }}"
        enabled: "{{ smb_enabled }}"
        browsable: "{{ ds.smb.browsable | default(omit) }}"
        state: "{{ 'present' if smb_enabled else 'absent' }}"
      loop: "{{ datasets | dict2items if datasets is defined else [] }}"
      when: "ds.smb is defined"
      loop_control:
        label: "{{ item.key }}"

    - name: Configure NFS service global settings
      arensb.truenas.nfs:
        bindip: "{{ services.nfs.bind_addresses | default(omit) }}"
        mountd_port: "{{ services.nfs.mountd_port | default(omit) }}"
        rpcstatd_port: "{{ services.nfs.rpcstatd_port | default(omit) }}"
        rpclockd_port: "{{ services.nfs.rpclockd_port | default(omit) }}"
        protocols: "{{ ['NFSv4'] if services.nfs.v4 | default(false) else omit }}"
      when: services is defined and services.nfs is defined

    # NFS share configuration is embedded in dataset definitions.
    # When nfs.enabled=false, the share is removed (state: absent).
    - name: Configure NFS shares from dataset definitions
      vars:
        ds: "{{ item.value }}"
        nfs_enabled: "{{ ds.nfs.enabled | default(false) }}"
      arensb.truenas.sharing_nfs:
        name: "{{ item.key }}"
        path: "/mnt/{{ ds.name }}"
        networks: "{{ ds.nfs.allowed_networks | default(omit) }}"
        readonly: "{{ ds.nfs.read_only | default(omit) }}"
        quiet: "{{ ds.nfs.quiet | default(omit) }}"
        alldirs: "{{ ds.nfs.all_dirs | default(omit) }}"
        options: "{{ ds.nfs.options | default(omit) }}"
        state: "{{ 'present' if nfs_enabled else 'absent' }}"
      loop: "{{ datasets | dict2items if datasets is defined else [] }}"
      when: "ds.nfs is defined"
      loop_control:
        label: "{{ item.key }}"

    - name: Ensure TrueNAS services are in the desired state (SSH excluded to prevent lockout)
      arensb.truenas.service:
        name: "{{ item.key }}"
        enabled: "{{ item.value.enabled | default(omit) }}"
        state: "{{ (item.value.state | default(omit)) }}"
      loop: "{{ services | dict2items if services is defined else [] }}"
      when: item.key != 'ssh'  # SSH is never managed - must be pre-enabled
      loop_control:
        label: "{{ item.key }}"

    - name: Schedule pool snapshot tasks
      arensb.truenas.pool_snapshot_task:
        match:
          dataset: "{{ item.value.dataset }}"
          name_format: "{{ item.value.name_format | default('auto-%Y-%m-%d_%H-%M') }}"
        dataset: "{{ item.value.dataset }}"
        name_format: "{{ item.value.name_format | default('auto-%Y-%m-%d_%H-%M') }}"
        recursive: "{{ item.value.recursive | default(false) }}"
        lifetime_value: "{{ (item.value.lifetime | default(omit)) | int if (item.value.lifetime is defined) else omit }}"
        lifetime_unit: "hours"
        minute: "{{ item.value.schedule.minute | default(omit) }}"
        hour: "{{ item.value.schedule.hour | default(omit) }}"
        day: "{{ item.value.schedule.day_month | default(omit) }}"
        month: "{{ item.value.schedule.month | default(omit) }}"
        weekday: "{{ item.value.schedule.day_week | default(omit) }}"
        enabled: "{{ item.value.enabled | default(true) }}"
        state: present
      loop: "{{ snapshot_tasks | dict2items if snapshot_tasks is defined else [] }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Schedule pool scrub tasks
      arensb.truenas.pool_scrub_task:
        pool: "{{ item.value.pool }}"
        threshold: "{{ item.value.threshold | default(omit) }}"
        description: "{{ item.value.description | default(omit) }}"
        minute: "{{ item.value.schedule.minute | default(omit) }}"
        hour: "{{ item.value.schedule.hour | default(omit) }}"
        day: "{{ item.value.schedule.day_month | default(omit) }}"
        month: "{{ item.value.schedule.month | default(omit) }}"
        weekday: "{{ item.value.schedule.day_week | default(omit) }}"
        enabled: "{{ item.value.enabled | default(true) }}"
        state: present
      loop: "{{ scrub_tasks | dict2items if scrub_tasks is defined else [] }}"
      loop_control:
        label: "{{ item.key }}"

    # NOTE: S.M.A.R.T. configuration removed - API deprecated in TrueNAS 25.10

  post_tasks:
    - name: Display note about any skipped password settings
      ansible.builtin.debug:
        msg: |
          If you provided any plain-text passwords via the environment (not crypt-style hashes), the playbook intentionally skipped setting them. Either provide crypt(3) hashes in those env vars, or set passwords manually through the TrueNAS UI/API.

    - name: Reminder - install collection if missing
      ansible.builtin.debug:
        msg: "Ensure 'arensb.truenas' collection is installed on control node: ansible-galaxy collection install arensb.truenas"
