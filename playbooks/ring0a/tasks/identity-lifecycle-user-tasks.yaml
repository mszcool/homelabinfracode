---
# User creation and update tasks for identity lifecycle management
# Called with loop from parent playbook
# Variables available:
#   - user: the user object from the inventory
#   - ou_user_pair: the full pair object (ou, user)

- name: Extract OU name from pair
  ansible.builtin.set_fact:
    ou: "{{ ou_user_pair[0] }}"

- name: Check if user exists
  ansible.builtin.command:
    cmd: "samba-tool user show '{{ user.name }}'"
  register: user_exists_check
  changed_when: false
  failed_when: false

- name: Create user if does not exist
  ansible.builtin.shell:
    cmd: "samba-tool user create '{{ user.name }}' --userou='OU={{ ou.name }}' --random-password --given-name='{{ user.givenName }}' --surname='{{ user.surname }} --display-name='{{ user.givenName }} {{ user.surname }}' --use-username-as-cn 2>&1; exit 0"
  register: user_create_result
  when: user_exists_check.rc != 0

- name: Set password on user creation if PWD env var is provided
  ansible.builtin.shell:
    cmd: "samba-tool user setpassword '{{ user.name }}' --newpassword='{{ lookup('env', user.name + '_PWD') }}' 2>&1; exit 0"
  when:
    - user_exists_check.rc != 0
    - lookup('env', user.name + '_PWD', default='') | length > 0

- name: Update user name and surname details if exists
  ansible.builtin.shell:
    cmd: "samba-tool user rename '{{ user.name }}' --given-name='{{ user.givenName }}' --surname='{{ user.surname }}' --display-name='{{ user.givenName }} {{ user.surname }}' 2>&1; exit 0"
  when: user_exists_check.rc == 0

- name: Update password if user exists and PWD env var is provided
  ansible.builtin.shell:
    cmd: "samba-tool user setpassword '{{ user.name }}' --newpassword='{{ lookup('env', user.name + '_PWD') }}' 2>&1; exit 0"
  when:
    - user_exists_check.rc == 0
    - lookup('env', user.name + '_PWD', default='') | length > 0

- name: Add user to each assigned group
  ansible.builtin.shell:
    cmd: "samba-tool group addmembers '{{ group }}' '{{ user.name }}' 2>&1; exit 0"
  loop: "{{ user.memberships }}"
  loop_control:
    loop_var: group
  register: group_membership_result
