---
# User creation and update tasks for identity lifecycle management
# Called with loop from parent playbook
# Variables available:
#   - user: the user object from the inventory
#   - ou_user_pair: the full pair object (ou, user)

- name: Extract OU name from pair
  ansible.builtin.set_fact:
    ou: "{{ ou_user_pair[0] }}"

- name: Check if user exists
  ansible.builtin.command:
    cmd: "samba-tool user show '{{ user.name }}'"
  register: user_exists_check
  changed_when: false
  failed_when: false

- name: Create user if does not exist
  ansible.builtin.shell:
    cmd: "samba-tool user create '{{ user.name }}' --userou='OU={{ ou.name }}' --random-password --given-name='{{ user.givenName }}' --surname='{{ user.surname }}' --use-username-as-cn "
  register: user_create_result
  when: user_exists_check.rc != 0

- name: Set password on user creation if 1Password item is configured for user
  ansible.builtin.shell:
    cmd: "samba-tool user setpassword '{{ user.name }}' --newpassword='{{ lookup('community.general.onepassword', user.op_item, field='password', vault=user.op_vault) }}' "
  when:
    - user_exists_check.rc != 0
    - user.op_vault is defined and user.op_vault | length > 0
    - user.op_item is defined and user.op_item | length > 0

- name: Update user name and surname details if exists
  ansible.builtin.shell:
    cmd: "samba-tool user rename '{{ user.name }}' --given-name='{{ user.givenName }}' --surname='{{ user.surname }}' --display-name='{{ user.givenName }} {{ user.surname }}' "
  when: user_exists_check.rc == 0

- name: Update password if user exists and 1Password item is configured for user
  ansible.builtin.shell:
    cmd: "samba-tool user setpassword '{{ user.name }}' --newpassword='{{ lookup('community.general.onepassword', user.op_item, field='password', vault=user.op_vault) }}' "
  when:
    - user_exists_check.rc == 0
    - user.op_vault is defined and user.op_vault | length > 0
    - user.op_item is defined and user.op_item | length > 0

- name: Add user to each assigned group
  ansible.builtin.shell:
    cmd: "samba-tool group addmembers '{{ group }}' '{{ user.name }}' "
  loop: "{{ user.memberships }}"
  loop_control:
    loop_var: group
  register: group_membership_result
  failed_when:
    - group_membership_result.rc != 0
    - "'Attribute member already exists' not in group_membership_result.stderr"
  changed_when: group_membership_result.rc == 0
