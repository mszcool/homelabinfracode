---
# Pre-flight check for secrets availability
#
# Include this task file at the beginning of playbooks that require secrets.
# It validates that the centralized vault_* variables (from secrets-vault.yaml)
# are defined and non-empty, regardless of whether they come from 1Password
# lookups or ansible-vault encrypted values.
#
# Usage in playbooks:
#   pre_tasks:
#     - name: Validate secrets availability
#       ansible.builtin.include_tasks:
#         file: ../tasks/validate_secrets.yaml

- name: Pre-flight -- Check that vault secrets are available
  ansible.builtin.assert:
    that:
      - vault_incus_root_user_password is defined
      - vault_incus_root_user_password | length > 0
      - vault_router_root_password is defined
      - vault_router_root_password | length > 0
      - vault_router_automation_password is defined
      - vault_router_automation_password | length > 0
      - vault_edge_wifi_passwords is defined
      - vault_edge_wifi_passwords | length > 0
      - vault_samba4_admin_password is defined
      - vault_samba4_admin_password | length > 0
      - vault_truenas_admin_password is defined
      - vault_truenas_admin_password | length > 0
    fail_msg: |
      One or more required secrets (vault_*) are not available.
      Secrets are defined in group_vars/all/secrets-vault.yaml.

      If using 1Password (default):
        - Ensure OP_SERVICE_ACCOUNT_TOKEN is set
        - Ensure op_vault_name is defined in secrets-config.yaml

      If using ansible-vault:
        - Ensure secrets-vault.yaml is encrypted and contains real values
        - Pass --ask-vault-pass or --vault-password-file when running playbooks

- name: Pre-flight -- Secrets validated successfully
  ansible.builtin.debug:
    msg: "All required vault_* secrets are available"
