---
# Pre-flight check for 1Password connectivity
#
# Include this task file at the beginning of playbooks that require secrets from 1Password.
# It validates that the 1Password CLI is available and that the service account token
# is configured, providing a clear error message if not.
#
# Usage in playbooks:
#   pre_tasks:
#     - name: Validate 1Password connectivity
#       ansible.builtin.include_tasks:
#         file: ../tasks/validate_onepassword.yaml

- name: Pre-flight -- Check that op_vault_name is defined
  ansible.builtin.assert:
    that:
      - op_vault_name is defined
      - op_vault_name | length > 0
    fail_msg: |
      1Password vault name (op_vault_name) is not configured.
      Ensure your inventory includes a secrets-config.yaml with op_vault_name set.
      Example: op_vault_name: "HomeLab-Prod"

- name: Pre-flight -- Check that OP_SERVICE_ACCOUNT_TOKEN is set
  ansible.builtin.assert:
    that:
      - lookup('env', 'OP_SERVICE_ACCOUNT_TOKEN') | length > 0
    fail_msg: |
      OP_SERVICE_ACCOUNT_TOKEN environment variable is not set.
      Set it before running playbooks:
        export OP_SERVICE_ACCOUNT_TOKEN="<your-service-account-token>"

- name: Pre-flight -- Verify 1Password connectivity by fetching a test value
  ansible.builtin.debug:
    msg: "1Password connectivity verified for vault '{{ op_vault_name }}'"
