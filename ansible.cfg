[defaults]
interpreter_python = ~/pythonvenv/default/bin/python3
inventory = ./configs/envbase/,./configs/envtest/inventory/
collections_path = ~/.ansible/collections:~/pythonvenv/default/lib/python3.12/site-packages

# Ignore directories that hold non-inventory data files referenced by playbooks.
# Currently: configs/<env>/home_assistant_files/ — Home Assistant config /
# .storage / dashboard files copied to the HA host by the apps-homeassistant
# playbook. (group_vars/host_vars are loaded by the variable manager and not
# affected by this setting.)
inventory_ignore_patterns = home_assistant_files

[collections]
paths = ~/.ansible/collections:~/pythonvenv/default/lib/python3.12/site-packages